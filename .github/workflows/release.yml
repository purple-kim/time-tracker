name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  mac:
    name: Build macOS app (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Google OAuth config
        env:
          GOOGLE_OAUTH_CLIENT_ID: 283154573553-tkdvcr8nlkd2f1vm86tspilsrhdn5aoq.apps.googleusercontent.com
          GOOGLE_TOKEN_PROXY_URL: ${{ vars.GOOGLE_TOKEN_PROXY_URL }}
        run: |
          if [ -z "$GOOGLE_TOKEN_PROXY_URL" ]; then
            echo "GOOGLE_TOKEN_PROXY_URL repository variable is not set."
            exit 1
          fi

          node -e 'const fs = require("fs"); fs.writeFileSync("google-calendar-build-config.json", JSON.stringify({ clientId: process.env.GOOGLE_OAUTH_CLIENT_ID, tokenProxyUrl: process.env.GOOGLE_TOKEN_PROXY_URL }, null, 2));'

      - name: Build DMG
        run: npm run dist:mac -- --${{ matrix.arch }} --publish never

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
