<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Tracker</title>
    <link rel="stylesheet" href="./styles.css?v=88" />
  </head>
  <body>
    <main class="floating-widget" aria-label="Floating focus character">
      <div class="time-badge" aria-live="polite">
        <span>WORK TIME</span>
        <strong id="workTimeLabel">00:00:00</strong>
        <small id="calendarLabel">다음 일정 확인 중</small>
      </div>

      <div class="agent-stage" aria-hidden="true">
        <img id="agentSprite" class="agent-sprite" alt="" decoding="async" />
        <span class="agent-shadow"></span>
      </div>

      <div id="contextMenu" class="context-menu" role="menu" aria-hidden="true">
        <div class="context-submenu" role="none">
          <button id="menuCatButton" class="has-submenu" type="button" role="menuitem" aria-haspopup="true">고양이 테마</button>
          <div class="context-submenu-panel" role="menu" aria-label="고양이 선택">
            <button type="button" role="menuitemradio" data-theme-id="brown-cat">치즈</button>
            <button type="button" role="menuitemradio" data-theme-id="black-cat">까망</button>
            <button type="button" role="menuitemradio" data-theme-id="calico-cat">삼색이</button>
            <button type="button" role="menuitemradio" data-theme-id="siamese-cat">샴</button>
          </div>
        </div>
        <button id="menuSoundButton" class="toggle-menu-item" type="button" role="switch" aria-checked="true">
          <span>타이핑 소리</span>
          <strong>ON</strong>
        </button>
        <button id="menuCalendarButton" type="button" role="menuitem">캘린더 연결</button>
        <button id="menuToggleButton" type="button" role="menuitem">일시정지</button>
        <button id="menuResetButton" type="button" role="menuitem">끝내기</button>
      </div>
    </main>

    <script src="./calendar-data.js?v=2" defer></script>
    <script src="./main.js?v=72" defer></script>
  </body>
</html>
